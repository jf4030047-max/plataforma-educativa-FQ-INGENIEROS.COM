<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Plataforma Educativa</title>
    <link rel="stylesheet" href="styles/educativa.css">
    <style>
        .perfil-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px #0078d71a;
            padding: 2rem 2.5rem;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: center;
            gap: 2.2rem;
        }
        .perfil-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #00bfae;
        }
        .perfil-datos h2 { margin: 0 0 0.3rem 0; }
        .perfil-datos { font-size: 1.08rem; }
        .progreso-bar {
            background: #e0f7fa;
            border-radius: 7px;
            height: 18px;
            margin: 0.7rem 0 1.2rem 0;
            width: 100%;
            overflow: hidden;
        }
        .progreso-bar-inner {
            background: linear-gradient(90deg, #0078d7 0%, #00bfae 100%);
            height: 100%;
            width: 68%;
            border-radius: 7px;
        }
        .cursos-lista, .certificados-lista {
            background: #f4f8fb;
            border-radius: 10px;
            padding: 1.2rem 1rem;
            margin-bottom: 2rem;
        }
        .cursos-lista li, .certificados-lista li { margin-bottom: 0.7rem; }
        .certificado-link {
            color: #0078d7;
            text-decoration: underline;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <a href="cursos.html">&larr; Catálogo</a>
        <h1>Mi Perfil</h1>
    </header>
    <main>
        <section id="perfil-info">
            <div class="perfil-card">
                <img src="https://randomuser.me/api/portraits/men/32.jpg" alt="Avatar" class="perfil-avatar">
                <div class="perfil-datos">
                    <h2>Juan Pérez</h2>
                    <div>Email: juan.perez@email.com</div>
                    <div>Miembro desde: 2024</div>
                </div>
            </div>
            <div>
                <h3>Progreso General</h3>
                <div class="progreso-bar"><div class="progreso-bar-inner"></div></div>
                <span>68% completado</span>
            </div>
            <div class="cursos-lista">
                <h3>Cursos Inscritos</h3>
                <ul>
                    <li>Introducción a la Programación <span style="color:#00bfae;">(En curso)</span></li>
                    <li>Excel para Ingenieros <span style="color:#0078d7;">(Finalizado)</span></li>
                </ul>
            </div>
            <div class="certificados-lista">
                <h3>Certificados y Constancias</h3>
                <div id="estado-certificado" style="margin-bottom:1rem;color:#0078d7;font-weight:500;"></div>
                <div id="acciones-certificado"></div>
                <div id="medios-pago"></div>
                <ul id="certificados-list"></ul>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 FQ Ingenieros - Plataforma Educativa</p>
    </footer>
    <script src="js/usuario.js"></script>
</body>
</html>
