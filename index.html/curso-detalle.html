<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Curso | Plataforma Educativa</title>
    <link rel="stylesheet" href="styles/educativa.css">
    <style>
        .curso-meta { color:#0078d7; font-size:1.05rem; margin-bottom:0.7rem; }
        .inscribirse-btn {
            background: linear-gradient(90deg, #0078d7 0%, #00bfae 100%);
            color: #fff;
            border: none;
            border-radius: 7px;
            padding: 0.55rem 1.3rem;
            font-size: 1.04rem;
            font-family: 'Segoe UI', Arial, sans-serif;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 2px 8px #00bfae33;
            margin-top: 1.2rem;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .inscribirse-btn:hover {
            background: linear-gradient(90deg, #00bfae 0%, #0078d7 100%);
            box-shadow: 0 4px 16px #00bfae55;
        }
        #foro { background: #f4f8fb; border-radius: 10px; padding: 1.2rem 1rem; }
        .foro-mensaje { background: #fff; border-radius: 6px; margin-bottom: 0.7rem; padding: 0.6rem 0.8rem; box-shadow: 0 1px 4px #0078d71a; }
    </style>
</head>
<body>
    <header class="main-header">
        <a href="cursos.html">&larr; Volver al Catálogo</a>
        <h1 id="curso-titulo">Nombre del Curso</h1>
    </header>
    <main>
        <section id="curso-info" style="margin-bottom:2.5rem;"></section>
        <section id="evaluaciones" style="margin-bottom:2.5rem;"></section>
        <section id="foro">
            <h3>Foro del Curso</h3>
            <div class="foro-mensaje"><b>Juan:</b> ¿Dónde encuentro los materiales de la semana 2?</div>
            <div class="foro-mensaje"><b>Laura (profesora):</b> Están en la sección de materiales, ¡cualquier duda me avisan!</div>
            <form style="margin-top:1rem;">
                <input type="text" placeholder="Escribe tu mensaje..." style="width:70%;padding:0.4rem;" />
                <button type="submit">Enviar</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 FQ Ingenieros - Plataforma Educativa</p>
    </footer>
    <script src="js/curso-detalle.js"></script>
</body>
</html>
