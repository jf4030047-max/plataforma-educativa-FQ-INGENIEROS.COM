<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificados | Plataforma Educativa</title>
    <link rel="stylesheet" href="styles/educativa.css">
    <style>
        .certificados-lista {
            background: #f4f8fb;
            border-radius: 10px;
            padding: 1.2rem 1rem;
            margin-bottom: 2rem;
        }
        .certificado {
            background: #fff;
            border-radius: 6px;
            margin-bottom: 0.8rem;
            padding: 0.7rem 1rem;
            box-shadow: 0 1px 4px #0078d71a;
            display: flex;
            align-items: center;
            gap: 1.2rem;
        }
        .certificado-titulo {
            font-weight: 600;
            color: #0078d7;
            margin-bottom: 0.2rem;
        }
        .certificado-estado {
            font-size: 0.97rem;
            color: #00bfae;
            margin-left: 1rem;
        }
        .certificado-btn {
            background: #00bfae;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.4rem 1rem;
            font-size: 1rem;
            cursor: pointer;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <a href="cursos.html">&larr; Catálogo</a>
        <h1>Certificados</h1>
    </header>
    <main>
        <section id="certificados">
            <div class="certificados-lista">
                <div class="certificado">
                    <div>
                        <div class="certificado-titulo">Excel para Ingenieros</div>
                        <div>Emitido: 5 de marzo de 2026</div>
                    </div>
                    <button class="certificado-btn">Descargar PDF</button>
                </div>
                <div class="certificado">
                    <div>
                        <div class="certificado-titulo">Introducción a la Programación</div>
                        <div>En progreso</div>
                    </div>
                    <button class="certificado-btn" disabled>Pendiente</button>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 FQ Ingenieros - Plataforma Educativa</p>
    </footer>
    <script src="js/certificados.js"></script>
</body>
</html>
