<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes | Plataforma Educativa</title>
    <link rel="stylesheet" href="styles/educativa.css">
    <style>
        .reportes-lista {
            background: #f4f8fb;
            border-radius: 10px;
            padding: 1.2rem 1rem;
            margin-bottom: 2rem;
        }
        .reporte {
            background: #fff;
            border-radius: 6px;
            margin-bottom: 0.8rem;
            padding: 0.7rem 1rem;
            box-shadow: 0 1px 4px #0078d71a;
        }
        .reporte-titulo {
            font-weight: 600;
            color: #0078d7;
            margin-bottom: 0.2rem;
        }
        .reporte-meta {
            font-size: 0.97rem;
            color: #888;
            margin-bottom: 0.3rem;
        }
        .reporte-btn {
            background: #0078d7;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 0.4rem 1rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <h1>Reportes</h1>
        <nav>
            <a href="cursos.html">Catálogo de Cursos</a>
            <a href="usuario.html">Mi Perfil</a>
            <a href="soporte.html">Soporte</a>
            <a href="admin.html">Administración</a>
        </nav>
    </header>
    <main>
        <section class="reportes-lista">
            <div class="reporte">
                <div class="reporte-titulo">Reporte de progreso de usuarios</div>
                <div class="reporte-meta">Actualizado: 18/03/2026</div>
                <button class="reporte-btn">Ver reporte</button>
            </div>
            <div class="reporte">
                <div class="reporte-titulo">Reporte de evaluaciones</div>
                <div class="reporte-meta">Actualizado: 18/03/2026</div>
                <button class="reporte-btn">Ver reporte</button>
            </div>
            <div class="reporte">
                <div class="reporte-titulo">Reporte de cursos activos</div>
                <div class="reporte-meta">Actualizado: 18/03/2026</div>
                <button class="reporte-btn">Ver reporte</button>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 FQ Ingenieros - Plataforma Educativa</p>
    </footer>
</body>
</html>
