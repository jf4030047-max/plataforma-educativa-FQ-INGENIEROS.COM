<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: url('https://th.bing.com/th/id/OIG4.ev3982ArX7cq0DDb9sG5?pid=ImgGn') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
        }
        .register-container {
            background: #fff;
            padding: 2.5rem 2rem 2rem 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 24px #0078d733;
            max-width: 420px;
            margin: 60px auto;
        }
        .register-container h2 {
            margin-bottom: 1.5rem;
            color: #0078d7;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .form-label {
            font-weight: 500;
        }
        .form-control:focus {
            border-color: #0078d7;
            box-shadow: 0 0 0 0.2rem #0078d733;
        }
        .btn-primary {
            background: #0078d7;
            border: none;
            font-weight: 600;
        }
        .btn-primary:hover {
            background: #005fa3;
        }
        .form-icon {
            color: #0078d7;
            margin-right: 0.5rem;
        }
        .form-text {
            color: #888;
        }
        @media (max-width: 600px) {
            .register-container {
                padding: 1rem;
                max-width: 98vw;
                margin: 30px auto;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2><i class="bi bi-person-plus form-icon"></i>Registro</h2>
        <form id="registroForm" novalidate>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person form-icon"></i>Nombre(s)</label>
                <input type="text" class="form-control" placeholder="Nombre(s)" required>
                <div class="invalid-feedback">Ingrese su nombre.</div>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-person form-icon"></i>Apellidos</label>
                <input type="text" class="form-control" placeholder="Apellidos" required>
                <div class="invalid-feedback">Ingrese sus apellidos.</div>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-credit-card-2-front form-icon"></i>DNI</label>
                <input type="text" class="form-control" placeholder="DNI" required maxlength="8" pattern="\d{8}" title="Debe tener exactamente 8 dígitos" autocomplete="off">
                <div class="invalid-feedback">Ingrese un DNI válido de 8 dígitos.</div>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-geo-alt form-icon"></i>Provincia</label>
                <select id="provincia" class="form-select" required>
                    <option value="">Selecciona una provincia</option>
                    <option value="Huancayo">Huancayo</option>
                    <option value="Concepción">Concepción</option>
                    <option value="Chanchamayo">Chanchamayo</option>
                    <option value="Jauja">Jauja</option>
                    <option value="Junín">Junín</option>
                    <option value="Satipo">Satipo</option>
                    <option value="Tarma">Tarma</option>
                    <option value="Yauli">Yauli</option>
                    <option value="Chupaca">Chupaca</option>
                </select>
                <div class="invalid-feedback">Seleccione una provincia.</div>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-house-door form-icon"></i>Dirección</label>
                <input type="text" class="form-control" placeholder="Dirección" id="direccion" required>
                <div class="invalid-feedback">Ingrese su dirección.</div>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-envelope form-icon"></i>Correo electrónico</label>
                <input type="email" class="form-control" placeholder="Correo electrónico" required>
                <div class="invalid-feedback">Ingrese un correo electrónico válido.</div>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="bi bi-telephone form-icon"></i>Teléfono</label>
                <input type="tel" class="form-control" placeholder="Teléfono" required maxlength="9" pattern="\d{9}">
                <div class="invalid-feedback">Ingrese un teléfono válido de 9 dígitos.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2"><i class="bi bi-person-plus"></i> Registrarse</button>
        </form>
        <p class="text-center mt-3">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>
        </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="registro.js"></script>
</body>
</html>
