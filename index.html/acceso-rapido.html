<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Rápido - FQ Ingenieros</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quick-access-container {
            background: #fff;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-align: center;
        }
        .quick-access-container h2 {
            margin-bottom: 2rem;
            color: #0078d7;
        }
        .quick-access-btn {
            display: block;
            width: 100%;
            margin-bottom: 1.2rem;
            padding: 0.9rem 0;
            font-size: 1.1rem;
            border: none;
            border-radius: 6px;
            background: #0078d7;
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .quick-access-btn:last-child {
            margin-bottom: 0;
        }
        .quick-access-btn:hover {
            background: #005fa3;
        }
    </style>
</head>
<body>
    <div class="quick-access-container">
        <h2>Acceso Rápido a Páginas</h2>
        <button class="quick-access-btn" onclick="window.open('registro.html','_blank')">Registro</button>
        <button class="quick-access-btn" onclick="window.open('login.html','_blank')">Acceso</button>
        <button class="quick-access-btn" onclick="window.open('presentacion.html','_blank')">Presentación</button>
        <button class="quick-access-btn" onclick="window.open('educativa.html','_blank')">Plataforma Educativa</button>
    </div>
</body>
</html>
