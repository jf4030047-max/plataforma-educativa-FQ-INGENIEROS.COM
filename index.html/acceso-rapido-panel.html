<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vista Panel - Todas las Páginas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
        }
        .panel-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 1.5rem;
            padding: 2rem;
            min-height: 100vh;
        }
        .panel {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .panel-title {
            background: #0078d7;
            color: #fff;
            padding: 0.7rem 1rem;
            font-size: 1.1rem;
            font-weight: 600;
        }
        .panel-iframe {
            flex: 1;
            border: none;
            width: 100%;
            min-height: 350px;
        }
        @media (max-width: 900px) {
            .panel-container {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(4, 1fr);
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="panel-container">
        <div class="panel">
            <div class="panel-title">Registro</div>
            <iframe class="panel-iframe" src="registro.html"></iframe>
        </div>
        <div class="panel">
            <div class="panel-title">Acceso</div>
            <iframe class="panel-iframe" src="login.html"></iframe>
        </div>
        <div class="panel">
            <div class="panel-title">Presentación</div>
            <iframe class="panel-iframe" src="presentacion.html"></iframe>
        </div>
        <div class="panel">
            <div class="panel-title">Plataforma Educativa</div>
            <iframe class="panel-iframe" src="educativa.html"></iframe>
        </div>
    </div>
</body>
</html>
