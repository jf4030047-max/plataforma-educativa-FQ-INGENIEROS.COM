<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Rápido - Menú Flotante</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .floating-menu {
            position: fixed;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            background: #0078d7;
            border-radius: 0 12px 12px 0;
            box-shadow: 2px 2px 12px #0078d733;
            padding: 1.2rem 0.7rem;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .floating-link {
            color: #fff;
            text-decoration: none;
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            transition: background 0.2s, color 0.2s;
            padding: 0.5rem 1rem 0.5rem 0.5rem;
            border-radius: 0 8px 8px 0;
        }
        .floating-link:hover {
            background: #005fa3;
            color: #cce6ff;
        }
        .floating-icon {
            font-size: 1.5rem;
        }
        .main-content {
            margin-left: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        @media (max-width: 600px) {
            .floating-menu {
                top: auto;
                bottom: 0;
                left: 50%;
                transform: translateX(-50%);
                flex-direction: row;
                border-radius: 12px 12px 0 0;
                padding: 0.7rem 1.2rem;
            }
            .main-content {
                margin-left: 0;
                margin-top: 80px;
            }
        }
    </style>
</head>
<body>
    <nav class="floating-menu">
        <a class="floating-link" href="registro.html" target="_blank"><span class="floating-icon">📝</span>Registro</a>
        <a class="floating-link" href="login.html" target="_blank"><span class="floating-icon">🔑</span>Acceso</a>
        <a class="floating-link" href="presentacion.html" target="_blank"><span class="floating-icon">🎬</span>Presentación</a>
        <a class="floating-link" href="educativa.html" target="_blank"><span class="floating-icon">📚</span>Plataforma</a>
    </nav>
    <div class="main-content">
        <h2>Acceso rápido con menú flotante</h2>
    </div>
</body>
</html>
