<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido</title>
    <style>
                body {
                    background: url('https://th.bing.com/th/id/OIG4.ev3982ArX7cq0DDb9sG5?pid=ImgGn') no-repeat center center fixed;
                    background-size: cover;
                }
        body {
            font-family: Arial, sans-serif;
            background-size: cover;
        }
        .main-container {
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        h2 { color: #0078d7; }
        .user-info { margin-top: 1.5rem; text-align: left; }
        @media (max-width: 600px) {
            .main-container {
                padding: 1rem;
                max-width: 95vw;
                margin: 30px auto;
            }
            body {
                background-attachment: scroll;
            }
        }
        @media (max-width: 400px) {
            .main-container {
                padding: 0.5rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h2>Bienvenido</h2>
        <div class="user-info" id="userInfo"></div>
        <button onclick="window.location.href='index.html'">Cerrar sesión</button>
    </div>
    <script src="main.js"></script>
    <script>
        setTimeout(function() {
            window.location.href = 'presentacion.html';
        }, 2000);
    </script>
</body>
</html>
