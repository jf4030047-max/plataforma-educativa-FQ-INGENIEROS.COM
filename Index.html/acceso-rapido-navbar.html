    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;

        }
        .navbar {
            width: 100%;
            background: #0078d7;
            padding: 0.7rem 0;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 0 2px 8px #0078d733;
        }
        .navbar ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 2.5rem;
        }
        .navbar li {
            display: inline;
        }
        .navbar a {
            color: #fff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: color 0.2s;
        }
        .navbar a:hover {
            color: #cce6ff;
            text-decoration: underline;
        }
        .main-content {
            margin-top: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
    </style>
</head>
